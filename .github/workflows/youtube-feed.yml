name: Latest Unlock Ton Computer YouTube Videos
on:
  schedule:
    # Once a day at 8am UTC (10am Paris). Hourly was overkill for a README
    # update and combined with flaky YouTube RSS 404s it was spamming the inbox.
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-readme-with-youtube:
    name: Update this repo's README with latest videos from YouTube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@master
        continue-on-error: true
        with:
          comment_tag_name: "YOUTUBE"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCn39_SPb2Q1n-ezRqwqJmaQ"
